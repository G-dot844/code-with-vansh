<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" role="img" aria-labelledby="title desc">
  <title id="title">Climbase logo made from climbing holds</title>
  <desc id="desc">The word Climbase is spelled using colorful climbing hold shapes connected by a route line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#063f2c"/>
      <stop offset="0.52" stop-color="#096545"/>
      <stop offset="1" stop-color="#0f8a5f"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#02130d" flood-opacity="0.38"/>
    </filter>
    <style>
      .guide { fill: none; stroke: rgba(255,255,255,.12); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .route { fill: none; stroke: #ffffff; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; opacity: .9; }
      .hold { filter: url(#shadow); stroke: rgba(255,255,255,.86); stroke-width: 5; }
      .green { fill: #11a06d; }
      .gold { fill: #f59e0b; }
      .red { fill: #cf3f30; }
      .white { fill: #f8fff9; }
    </style>
  </defs>

  <rect x="10" y="10" width="1160" height="280" rx="48" fill="url(#bg)"/>
  <path d="M50 246 C160 64, 292 236, 416 96 S610 44, 728 158 S918 236, 1118 76" class="guide"/>
  <ellipse class="hold gold" cx="100" cy="88" rx="25" ry="19" transform="rotate(-20 100 88)"/>
  <ellipse class="hold green" cx="72" cy="128" rx="24" ry="18" transform="rotate(22 72 128)"/>
  <ellipse class="hold red" cx="74" cy="177" rx="25" ry="18" transform="rotate(-16 74 177)"/>
  <ellipse class="hold white" cx="103" cy="218" rx="27" ry="19" transform="rotate(25 103 218)"/>
  <ellipse class="hold green" cx="155" cy="218" rx="25" ry="18" transform="rotate(-8 155 218)"/>
  <ellipse class="hold gold" cx="155" cy="86" rx="25" ry="18" transform="rotate(16 155 86)"/>
  <ellipse class="hold white" cx="215" cy="74" rx="21" ry="17" transform="rotate(18 215 74)"/>
  <ellipse class="hold green" cx="215" cy="118" rx="22" ry="17" transform="rotate(-20 215 118)"/>
  <ellipse class="hold gold" cx="215" cy="162" rx="21" ry="17" transform="rotate(28 215 162)"/>
  <ellipse class="hold red" cx="215" cy="206" rx="22" ry="17" transform="rotate(-18 215 206)"/>
  <ellipse class="hold gold" cx="276" cy="72" rx="18" ry="15" transform="rotate(10 276 72)"/>
  <ellipse class="hold green" cx="276" cy="130" rx="21" ry="17" transform="rotate(-22 276 130)"/>
  <ellipse class="hold white" cx="276" cy="174" rx="20" ry="16" transform="rotate(20 276 174)"/>
  <ellipse class="hold red" cx="276" cy="218" rx="21" ry="17" transform="rotate(-10 276 218)"/>
  <path class="route" d="M74 177 C184 62, 276 72, 390 148 S590 206, 710 170 S858 126, 968 218"/>
</svg>
