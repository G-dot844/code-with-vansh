<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" role="img" aria-labelledby="title desc">
  <title id="title">Climbase hold wordmark</title>
  <desc id="desc">The word Climbase filled with colorful climbing holds and a route line.</desc>
  <defs>
    <linearGradient id="wordGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fff9"/>
      <stop offset="0.46" stop-color="#d9f6e5"/>
      <stop offset="1" stop-color="#b9f6d5"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-30%" width="120%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#07110d" flood-opacity="0.28"/>
    </filter>
    <clipPath id="wordClip">
      <text x="34" y="145" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" letter-spacing="-5">Climbase</text>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="964" height="204" rx="42" fill="#096545"/>
  <path d="M30 174 C130 82, 230 188, 332 86 S552 63, 668 138 S836 142, 936 56" fill="none" stroke="#0f8a5f" stroke-width="68" opacity="0.28" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <text x="34" y="145" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" letter-spacing="-5" fill="url(#wordGradient)" stroke="#ffffff" stroke-width="5">Climbase</text>
  </g>

  <g clip-path="url(#wordClip)">
    <rect x="26" y="42" width="930" height="128" fill="rgba(255,255,255,0.04)"/>
    <g opacity="0.96">
      <ellipse cx="82" cy="120" rx="26" ry="18" fill="#f59e0b" transform="rotate(-18 82 120)"/>
      <ellipse cx="145" cy="86" rx="24" ry="16" fill="#11a06d" transform="rotate(26 145 86)"/>
      <ellipse cx="202" cy="130" rx="22" ry="15" fill="#cf3f30" transform="rotate(-34 202 130)"/>
      <ellipse cx="278" cy="91" rx="27" ry="18" fill="#ffffff" transform="rotate(17 278 91)"/>
      <ellipse cx="344" cy="136" rx="25" ry="17" fill="#f59e0b" transform="rotate(-24 344 136)"/>
      <ellipse cx="410" cy="80" rx="23" ry="16" fill="#11a06d" transform="rotate(31 410 80)"/>
      <ellipse cx="486" cy="124" rx="28" ry="18" fill="#cf3f30" transform="rotate(-10 486 124)"/>
      <ellipse cx="556" cy="92" rx="24" ry="16" fill="#ffffff" transform="rotate(28 556 92)"/>
      <ellipse cx="627" cy="137" rx="25" ry="17" fill="#f59e0b" transform="rotate(-30 627 137)"/>
      <ellipse cx="704" cy="86" rx="27" ry="18" fill="#11a06d" transform="rotate(14 704 86)"/>
      <ellipse cx="781" cy="130" rx="24" ry="16" fill="#cf3f30" transform="rotate(-24 781 130)"/>
      <ellipse cx="870" cy="95" rx="29" ry="19" fill="#ffffff" transform="rotate(24 870 95)"/>
      <ellipse cx="918" cy="140" rx="23" ry="16" fill="#f59e0b" transform="rotate(-18 918 140)"/>
    </g>
    <g fill="none" stroke="#08251a" stroke-width="4" opacity="0.24">
      <path d="M58 80 158 142 272 78 390 138 518 74 646 144 784 84 930 146"/>
      <path d="M42 142 174 72 296 136 430 78 580 138 730 76 902 128"/>
    </g>
  </g>

  <path d="M80 162 C188 82, 300 158, 414 92 S612 88, 724 130 S846 139, 910 66" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="80" cy="162" r="13" fill="#f59e0b" stroke="#ffffff" stroke-width="5"/>
  <circle cx="414" cy="92" r="12" fill="#11a06d" stroke="#ffffff" stroke-width="5"/>
  <circle cx="724" cy="130" r="12" fill="#cf3f30" stroke="#ffffff" stroke-width="5"/>
  <circle cx="910" cy="66" r="14" fill="#f59e0b" stroke="#ffffff" stroke-width="5"/>
